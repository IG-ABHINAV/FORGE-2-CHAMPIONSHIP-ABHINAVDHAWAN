# Hermes (orchestrator / product owner) — EastRouter config. Secrets REDACTED.
provider: openai
base_url: https://api.eastrouter.com/v1
api_key:  ${EASTROUTER_API_KEY}      # never commit the real sk-er_ key
model:    moonshotai/kimi-k2.6        # strong reasoning for planning (Kimi K2.6)
max_tokens: 4096
temperature: 0.4

memory:
  enabled: true
  context_window: 32000
  sprint_history: true

slack:
  app_token: ${SLACK_APP_TOKEN}
  bot_token: ${SLACK_BOT_TOKEN}
  channels:
    sprint_main: "#sprint-main"
    agent_coder: "#agent-coder"
    human_review: "#human-review"
    ci_cd: "#ci-cd"
    agent_log: "#agent-log"

behavior:
  role: product_owner
  sprint_planning: true
  task_decomposition: true
  pr_review: true
  assign_to: openclaw
  report_channel: "#sprint-main"
  review_channel: "#human-review"
