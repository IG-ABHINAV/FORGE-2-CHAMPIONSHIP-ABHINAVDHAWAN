# CI/Deploy agent skill — automates build verification and deployment
provider: eastrouter
base_url: https://api.eastrouter.com/v1
api_key: ${EASTROUTER_API_KEY}
model: z-ai/glm-5.1

role: ci_deploy
description: Runs CI pipeline checks, verifies builds, triggers deployment to Render

slack:
  bot_token: ${SLACK_BOT_TOKEN}
  channels: ["#ci-cd"]

pipeline:
  - step: install
    command: "cd backend && composer install --no-interaction"
  - step: migrate
    command: "cd backend && php artisan migrate --force"
  - step: test
    command: "cd backend && php artisan test"
  - step: build_frontend
    command: "cd frontend && npm install && npm run build"
  - step: deploy
    target: render
    branch: main
    auto_deploy: false
