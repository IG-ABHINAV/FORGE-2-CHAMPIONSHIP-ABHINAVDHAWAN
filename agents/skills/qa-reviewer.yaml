# QA Reviewer skill — uses moonshotai/kimi-k2.7-code for code review
provider: eastrouter
base_url: https://api.eastrouter.com/v1
api_key: ${EASTROUTER_API_KEY}
model: moonshotai/kimi-k2.7-code
max_tokens: 4096

role: qa_reviewer
description: Reviews PRs from OpenClaw, runs tests, checks tenant isolation

slack:
  bot_token: ${SLACK_BOT_TOKEN}
  channels: ["#ci-cd", "#agent-log"]

checks:
  - run_tests: "php artisan test"
  - check_isolation: "grep -r 'organization_id' app/Models/"
  - check_auth: "grep -r 'auth:sanctum' routes/api.php"
  - lint: "npm run lint"
