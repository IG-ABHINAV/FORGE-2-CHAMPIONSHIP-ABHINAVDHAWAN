databases:
  # MySQL Database Service
  - name: pulsedesk-db
    databaseName: pulsedesk
    user: pulsedesk_user
    plan: free

services:
  # Laravel 11 Backend Web Service (Dockerized)
  - type: web
    name: pulsedesk-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: pulsedesk-db
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        fromDatabase:
          name: pulsedesk-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: pulsedesk-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pulsedesk-db
          property: password
      - key: EASTROUTER_API_KEY
        sync: false # to be set manually in Render dashboard
      - key: EASTROUTER_BASE_URL
        value: https://api.eastrouter.com/v1
